        <!-- ====================== PRIMARY SEO BLOCK ====================== -->
        <!-- Title: 50-60 chars sweet spot before Google truncates. Lead with
             primary verb ("Buy & sell"), keyword ("Event Tickets"), brand. -->
        <title>Buy & Sell Event Tickets Online | Allsale Events NZ</title>

        <!-- Description: 120-155 chars including a CTA. Counted at 152 chars. -->
        <meta
            name="description"
            content="Discover concerts, comedy, sports & theatre across NZ on Allsale Events. Buy with 10-minute seat holds — or sell your own show with zero platform tax."
        />
        <meta
            name="keywords"
            content="event tickets, buy tickets online, sell tickets, concert tickets, comedy tickets, sports tickets, theatre tickets, festival tickets, NZ events, Auckland events, Wellington events, ticketing platform, event organizer, book event tickets, seat map booking, e-tickets, QR ticket"
        />
        <meta name="author" content="Allsale Events" />
        <meta name="robots" content="index, follow, max-image-preview:large" />
        <link rel="canonical" href="https://allsale.events/" />

        <!-- ====================== OPEN GRAPH (Facebook, LinkedIn, iMessage) ====================== -->

        <meta property="og:url" content="https://allsale.events/" />
        <meta
            property="og:title"
            content="Buy & Sell Event Tickets Online | Allsale Events NZ"

            property="og:description"
            content="Discover concerts, comedy, sports & theatre across NZ on Allsale Events. Buy with 10-minute seat holds — or sell your own show with zero platform tax."

        <meta property="og:image" content="https://allsale.events/allsale-logo.png" />
        <meta property="og:image:alt" content="Allsale Events logo" />
        <meta property="og:locale" content="en_NZ" />

        <meta
            name="twitter:description"
            content="Discover concerts, comedy, sports & theatre across NZ on Allsale Events. Buy with 10-minute seat holds — or sell your own show with zero platform tax."
        />
        <meta name="twitter:image" content="https://allsale.events/allsale-logo.png" />

{
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Allsale Events",
    "url": "https://allsale.events/",
    "logo": "https://allsale.events/allsale-logo.png",
    "description": "New Zealand's modern event ticketing platform. Buy and sell concert, comedy, sports, theatre and festival tickets with QR e-tickets, custom seat maps and 10-minute seat holds.",
    "email": "support@allsale.events",
    "areaServed": "NZ",
    "sameAs": []
}
        </script>
        <!-- WebSite schema enables Google's site-search box in SERPs. -->
        <script type="application/ld+json">

    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Allsale Events",
    "url": "https://allsale.events/",
    "potentialAction": {
        "@type": "SearchAction",
        "target": "https://allsale.events/events?q={search_term_string}",
        "query-input": "required name=search_term_string"
    }
}
        </script>

             (CRA substitutes %REACT_APP_*% inside public/index.html). Defaults

            // `config` only fires if the env var was actually substituted by CRA

            if (__ga_id && __ga_id.indexOf('%') === -1) {
                gtag('config', __ga_id, { send_page_view: true });

        <noscript>
            <!--
              Rich SEO fallback: search engines and social crawlers that don't
              execute JavaScript still get a meaningful page (heading, content,
              keywords, internal links) instead of an empty SPA shell.
            -->
            <header>
                <img
                    src="/allsale-logo.png"
                    alt="Allsale Events — New Zealand event ticketing platform"
                    width="200"
                />
                <h1>Allsale Events — Buy &amp; Sell Event Tickets Online</h1>
                <p>
                    Allsale Events is New Zealand's modern event ticketing platform.
                    Discover live concerts, comedy nights, sports fixtures, theatre productions
                    and festivals — then book tickets in seconds with our 10-minute seat hold,
                    QR-code e-tickets and offline door-scanner app.
                </p>
            </header>
            <main>
                <section>
                    <h2>Why book with Allsale Events</h2>
                    <ul>
                        <li><strong>Multi-tier ticketing:</strong> Early Bird, General Admission and VIP — set capacity and selling windows per tier.</li>
                        <li><strong>Custom seat maps:</strong> Pick exactly where you sit. Aisles, sections, categories and accessible seats are all supported.</li>
                        <li><strong>Instant e-tickets:</strong> QR-coded tickets land in your inbox within seconds of paying. Print or store on your phone.</li>
                        <li><strong>Door-scanner PWA:</strong> Staff scan tickets even when venue Wi-Fi is patchy — fully offline-capable.</li>
                        <li><strong>Secure Stripe payments:</strong> Card payments processed via Stripe Connect with NZ payouts five days after the show.</li>
                    </ul>
                </section>
                <section>
                    <h2>For event organisers</h2>
                    <p>
                        Run your own concert, comedy night, sports event or festival on Allsale Events.
                        Organisers keep 100% of the ticket price — the buyer covers the service fee.
                        No setup fees, no contracts, no platform tax. Sell tickets, manage seat maps,
                        scan attendees at the door and get paid five days after the event closes via
                        Stripe Connect.
                    </p>
                    <p>
                        <a href="/become-organizer">Become an organiser</a> ·
                        <a href="/organizer/new">List your first event</a> ·
                        <a href="/features">All platform features</a>
                    </p>
                </section>
                <section>
                    <h2>For event-goers</h2>
                    <p>
                        Browse upcoming shows, pick your seats on our interactive seat map, hold them
                        for 10 minutes while you pay, and receive an e-ticket with a QR code that scans
                        at the door. Tickets are transferable to friends through your Allsale account.
                    </p>
                    <p>
                        <a href="/events">Browse all events</a> ·
                        <a href="/signup">Create a free account</a> ·
                        <a href="/about">About Allsale Events</a> ·
                        <a href="/contact">Contact us</a>
                    </p>
                </section>
                <section>
                    <h2>Popular categories</h2>
                    <ul>
                        <li><a href="/events?category=concerts">Concert tickets</a></li>
                        <li><a href="/events?category=comedy">Comedy tickets</a></li>
                        <li><a href="/events?category=sports">Sports tickets</a></li>
                        <li><a href="/events?category=theatre">Theatre tickets</a></li>
                        <li><a href="/events?category=festivals">Festival tickets</a></li>
                    </ul>
                </section>
                <footer>
                    <p>
                        Allsale Events · support@allsale.events ·
                        <a href="/contact">Contact</a> ·
                        <a href="/about">About</a> ·
                        <a href="/features">Features</a> ·
                        <a href="/influencers">Creator marketplace</a> ·
                        Please enable JavaScript for the interactive experience.
                    </p>
                </footer>
            </main>
        </noscript>
